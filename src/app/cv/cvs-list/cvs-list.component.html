<ol class="list-group" data-cy="cvsList">
  @for (cv of cvs; track cv.id; let isEven = $even) {
    <li
      class="list-group-item"
    [ngClass]="{
      'list-group-item-primary': isEven,
      'list-group-item-secondary': !isEven
    }"
      >
      <app-cv-item [cv]="cv" />
    </li>
  }
</ol>
